<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video</title>

<style>
body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

video{
width:100%;
height:100%;
}

#btn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
background:#6a5cff;
color:#fff;
text-decoration:none;
border-radius:25px;
font-weight:bold;
}
</style>
</head>

<body>

<video id="v" controls autoplay muted playsinline></video>

<a id="btn" target="_blank">DOWNLOAD</a>

<script>
const id = new URLSearchParams(location.search).get("id");

// 👇 YOUR CDN
const videoURL = "https://cdn.videiyy.cc/" + id + ".mp4";

document.getElementById("v").src = videoURL;
document.getElementById("btn").href = videoURL;
</script>

</body>
</html>
